<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Hub</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0f;
color:white;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#111;
border-bottom:2px solid #00e5ff;
}

.logo{
font-size:26px;
font-weight:bold;
color:#00e5ff;
text-shadow:0 0 10px #00e5ff;
}

.nav button{
background:none;
border:none;
color:white;
font-size:16px;
margin-left:20px;
cursor:pointer;
padding:6px 12px;
border-radius:6px;
transition:0.2s;
}

.nav button:hover{
background:#00e5ff;
color:black;
}

/* PAGE */

.container{
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* GAME CARD */

.card{
background:#121218;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
border:2px solid transparent;
}

.card:hover{
transform:scale(1.05);
border:2px solid #00e5ff;
box-shadow:0 0 15px #00e5ff;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
text-align:center;
padding:10px;
font-weight:bold;
}

/* GAME PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:100;
}

.player iframe{
flex:1;
border:none;
}

.playerbar{
background:#111;
padding:10px;
}

.playerbar button{
background:#00e5ff;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">🕹 Arcade Hub</div>

<div class="nav">
<button onclick="showSection('games')">Games</button>
<button onclick="showSection('apps')">Apps</button>
</div>
</div>

<div class="container">

<!-- GAMES -->

<div id="gamesSection">
<div class="grid">

<div class="card" onclick="playGame('games/karlson/index.html')">
<img src="https://i.imgur.com/Wp6X6xS.jpg">
<p>Karlson</p>
</div>

<div class="card" onclick="playGame('A Difficult Game About Climbing.html')">
<img src="https://i.imgur.com/ZK8sY5F.jpg">
<p>A Difficult Game About Climbing</p>
</div>

<div class="card" onclick="playGame('Hollow Knight.html')">
<img src="https://i.imgur.com/0rR4Y9V.jpg">
<p>Hollow Knight</p>
</div>

<div class="card" onclick="playGame('Minecraft 1.12.2.html')">
<img src="https://i.imgur.com/KhvYp9Y.jpg">
<p>Minecraft Classic</p>
</div>

<div class="card" onclick="playGame('Gorilla Tag.html')">
<img src="https://i.imgur.com/0rR4Y9V.jpg">
<p>Gorilla Tag</p>
</div>

<div class="card" onclick="playGame('maddoxcloud.com/app/roblox/queue')">
<img src="https://i.imgur.com/0rR4Y9V.jpg">
<p>Roblox</p>
</div>

</div>
</div>

<!-- APPS -->

<div id="appsSection" style="display:none">
<div class="grid">

<div class="card" onclick="playGame('https://himrbonker.github.io/tiktok/')">
<img src="https://i.imgur.com/yY7F6bN.jpg">
<p>TikTok</p>
</div>

<div class="card" onclick="playGame('apps/notepad/index.html')">
<img src="https://i.imgur.com/yY7F6bN.jpg">
<p>Notepad</p>
</div>

</div>
</div>

</div>

<!-- PLAYER -->

<div class="player" id="player">

<div class="playerbar">
<button onclick="closeGame()">⬅ Back</button>
</div>

<iframe id="gameFrame"></iframe>

</div>

<script>

function playGame(url){
document.getElementById("player").style.display="flex"
document.getElementById("gameFrame").src=url
}

function closeGame(){
document.getElementById("player").style.display="none"
document.getElementById("gameFrame").src=""
}

function showSection(section){

document.getElementById("gamesSection").style.display="none"
document.getElementById("appsSection").style.display="none"

if(section==="games"){
document.getElementById("gamesSection").style.display="block"
}

if(section==="apps"){
document.getElementById("appsSection").style.display="block"
}

}

</script>

</body>
</html>
