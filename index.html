<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning Arc@de</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --light: #cccccc;
  --mid: #888888;
  --dark: #333333;
  --black: #000000;
  --overlay: rgba(0,0,0,0.72);
}

html, body {
  width: 100%; height: 100%;
  font-family: 'Share Tech Mono', monospace;
  color: var(--white);
  overflow-x: hidden;
  background: #000;
}

/* BACKGROUND */
#bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: #111;
}
#bg-layer img, #bg-layer video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: grayscale(100%) brightness(0.45);
}

/* scanline overlay */
body::after {
  content: "";
  position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
}

/* TOPBAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 28px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.logo-small {
  font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 900;
  color: var(--white); letter-spacing: 2px;
  cursor: pointer; filter: grayscale(100%);
  transition: filter 0.3s; text-decoration: none;
}
.logo-small:hover { filter: grayscale(0%); color: #00e5ff; }

.nav { display: flex; gap: 10px; align-items: center; }

.nav button {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--mid); padding: 7px 16px;
  border-radius: 8px; cursor: pointer;
  filter: grayscale(100%);
  transition: filter 0.25s, transform 0.2s, color 0.25s, background 0.25s, box-shadow 0.25s;
  letter-spacing: 1px;
}
.nav button:hover {
  filter: grayscale(0%); transform: scale(1.12);
  color: #000; background: #00e5ff;
  box-shadow: 0 0 16px #00e5ff; border-color: #00e5ff;
}

#bgBtn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--mid); font-size: 18px;
  width: 36px; height: 36px; border-radius: 8px;
  cursor: pointer; filter: grayscale(100%);
  transition: filter 0.25s, transform 0.2s;
  display: flex; align-items: center; justify-content: center;
}
#bgBtn:hover { filter: grayscale(0%); transform: scale(1.15); }

/* PAGES */
.page { display: none; position: relative; z-index: 10; }
.page.active { display: block; }

/* HOME SCREEN */
#homePage {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding-top: 110px;
}
.hero { text-align: center; margin-bottom: 60px; }

@keyframes flicker {
  0%   { opacity: 0; }
  5%   { opacity: 1; }
  6%   { opacity: 0; }
  7%   { opacity: 1; }
  10%  { opacity: 0; }
  11%  { opacity: 1; }
  15%  { opacity: 0.4; }
  16%  { opacity: 1; }
  20%  { opacity: 0; }
  22%  { opacity: 1; }
  30%  { opacity: 0.7; }
  31%  { opacity: 0; }
  32%  { opacity: 1; }
  40%  { opacity: 1; }
  50%  { opacity: 0.9; }
  51%  { opacity: 0; }
  52%  { opacity: 1; }
  100% { opacity: 1; }
}
@keyframes glow-pulse {
  0%, 100% { text-shadow: 0 0 10px rgba(255,255,255,0.3), 0 0 30px rgba(255,255,255,0.1); }
  50% { text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 60px rgba(255,255,255,0.2); }
}
.hero-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(38px, 8vw, 90px); font-weight: 900;
  letter-spacing: 4px; color: var(--white);
  animation: flicker 2.5s ease-out forwards, glow-pulse 4s ease-in-out infinite 2.5s;
  line-height: 1.1;
}
.hero-title .at { color: var(--light); }
.hero-sub {
  font-size: 13px; color: var(--mid);
  letter-spacing: 6px; margin-top: 16px;
  text-transform: uppercase; opacity: 0;
  animation: fadeUp 0.6s ease forwards 2.8s;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.home-label {
  font-size: 11px; letter-spacing: 5px; color: var(--mid);
  text-transform: uppercase; margin-bottom: 18px;
  text-align: center; opacity: 0;
  animation: fadeUp 0.5s ease forwards 3s;
}
.home-grid {
  display: flex; gap: 20px; flex-wrap: wrap;
  justify-content: center; padding: 0 20px;
  opacity: 0; animation: fadeUp 0.7s ease forwards 3.2s;
}
.home-grid .card { width: 200px; height: 200px; }

/* GAME GRID */
.container { padding: 100px 30px 40px; }
.section-title {
  font-size: 11px; letter-spacing: 5px; color: var(--mid);
  text-transform: uppercase; margin-bottom: 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  aspect-ratio: 1/1; border-radius: 18px;
  overflow: hidden; cursor: pointer; position: relative;
  filter: grayscale(100%) brightness(0.7);
  transition: filter 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
  border: 1px solid rgba(255,255,255,0.08);
}
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card p { display: none; }
.card:hover {
  filter: grayscale(0%) brightness(1);
  transform: scale(1.13);
  box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.35);
  z-index: 5;
}
.card::before {
  content: attr(data-name);
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.82); color: white;
  font-size: 11px; letter-spacing: 1px;
  text-align: center; padding: 6px 4px;
  transform: translateY(100%);
  transition: transform 0.2s ease;
  z-index: 2; font-family: 'Share Tech Mono', monospace;
}
.card:hover::before { transform: translateY(0); }

/* PLAYER */
.player {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.97);
  display: none; flex-direction: column;
}
.player.open { display: flex; }
.player iframe { flex: 1; border: none; width: 100%; }
.playerbar {
  background: rgba(5,5,5,0.95); padding: 10px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; gap: 12px;
}
.playerbar button {
  font-family: 'Share Tech Mono', monospace;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--mid); padding: 7px 18px;
  border-radius: 8px; cursor: pointer; font-size: 13px;
  filter: grayscale(100%);
  transition: filter 0.25s, transform 0.2s, color 0.25s, background 0.25s;
}
.playerbar button:hover {
  filter: grayscale(0%); transform: scale(1.1);
  color: #000; background: #00e5ff; border-color: #00e5ff;
}

/* BG PANEL */
#bgPanel {
  display: none; position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.88);
  align-items: center; justify-content: center;
}
#bgPanel.open { display: flex; }
.bg-box {
  background: #111; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 32px; width: 380px;
  display: flex; flex-direction: column; gap: 14px;
  font-family: 'Share Tech Mono', monospace;
}
.bg-box h2 {
  font-family: 'Orbitron', monospace; font-size: 16px;
  font-weight: 700; letter-spacing: 2px; color: var(--white); margin-bottom: 4px;
}
.bg-box p { font-size: 12px; color: var(--mid); letter-spacing: 1px; }
.bg-box label {
  display: flex; flex-direction: column; gap: 6px;
  font-size: 12px; color: var(--light); letter-spacing: 1px; cursor: pointer;
}
.bg-box label span {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 10px 14px; color: var(--mid); transition: 0.2s; text-align: center;
}
.bg-box label:hover span { background: rgba(255,255,255,0.12); color: #fff; }
.bg-box input[type=text] {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 9px 12px; color: white;
  font-family: 'Share Tech Mono', monospace; font-size: 12px; width: 100%;
}
.bg-box input[type=text]::placeholder { color: var(--dark); }
.bg-box .row { display: flex; gap: 10px; }
.bg-box .row button {
  flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 12px;
  padding: 9px; border-radius: 8px; cursor: pointer; letter-spacing: 1px; transition: 0.2s;
}
.bg-box .row button.apply { background: white; color: black; border: none; }
.bg-box .row button.apply:hover { background: #00e5ff; }
.bg-box .row button.cancel { background: transparent; color: var(--mid); border: 1px solid rgba(255,255,255,0.15); }
.bg-box .row button.cancel:hover { color: white; }

/* PRESETS */
.preset-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.preset-btn {
  position: relative;
  aspect-ratio: 16/9;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.2s;
  padding: 0;
  background: #000;
}
.preset-btn:hover { transform: scale(1.06); border-color: rgba(255,255,255,0.5); }
.preset-btn.active { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.4); }
.preset-btn img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: grayscale(40%) brightness(0.7);
  transition: filter 0.2s;
}
.preset-btn:hover img { filter: grayscale(0%) brightness(1); }
.preset-btn span {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.75);
  font-size: 9px; letter-spacing: 1px;
  text-align: center; padding: 4px 2px;
  color: #aaa; font-family: 'Share Tech Mono', monospace;
  text-transform: uppercase;
}
.bg-divider {
  height: 1px; background: rgba(255,255,255,0.1); margin: 2px 0;
}

/* LOADING SCREEN */
#loader {
  position: fixed; inset: 0; z-index: 999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
  transition: opacity 0.7s ease, visibility 0.7s ease;
}
#loader.hidden {
  opacity: 0; visibility: hidden; pointer-events: none;
}
.loader-logo {
  font-family: 'Orbitron', monospace;
  font-size: clamp(30px, 7vw, 64px);
  font-weight: 900;
  color: white;
  letter-spacing: 3px;
  animation: loaderFlicker 1.6s ease-out forwards;
}
@keyframes loaderFlicker {
  0%   { opacity: 0; }
  6%   { opacity: 1; }
  7%   { opacity: 0; }
  9%   { opacity: 1; }
  13%  { opacity: 0; }
  14%  { opacity: 1; }
  20%  { opacity: 0.2; }
  21%  { opacity: 1; }
  33%  { opacity: 0; }
  34%  { opacity: 1; }
  100% { opacity: 1; }
}
.loader-bar-wrap {
  width: min(340px, 72vw);
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
}
.loader-bar {
  height: 100%; width: 0%;
  background: #fff;
  border-radius: 99px;
  animation: loadProgress 2.2s cubic-bezier(0.4,0,0.2,1) forwards;
  position: relative;
}
.loader-bar::after {
  content: '';
  position: absolute; right: 0; top: -2px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px 2px rgba(255,255,255,0.8);
}
@keyframes loadProgress {
  0%   { width: 0%; }
  20%  { width: 18%; }
  40%  { width: 42%; }
  65%  { width: 67%; }
  82%  { width: 85%; }
  100% { width: 100%; }
}
.loader-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; color: var(--mid);
  letter-spacing: 4px; text-transform: uppercase;
}
.loader-dots::after {
  content: '';
  animation: dots 1.2s steps(4, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
  100% { content: ''; }
}

</style>
</head>

<script>
// Loading screen
const phases = ['Booting systems', 'Loading assets', 'Connecting arcade', 'Almost ready'];
let phase = 0;
const loaderText = document.getElementById('loaderText');
const phaseInterval = setInterval(() => {
  phase++;
  if (phase < phases.length) loaderText.textContent = phases[phase];
}, 550);

window.addEventListener('load', () => {
  clearInterval(phaseInterval);
  loaderText.textContent = 'Ready';
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 600);
});

// Fallback: hide after 3s even if load doesn't fire cleanly
setTimeout(() => {
  document.getElementById('loader').classList.add('hidden');
}, 3200);

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(name + 'Page').classList.add('active');
}
function goHome() {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('homePage').classList.add('active');
}
function playGame(url) {
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loaderText');
  const frame = document.getElementById('gameFrame');

  // Reset loader state
  loader.classList.remove('hidden');
  loaderText.textContent = 'Loading Game';

  // Restart loading bar animation
  const bar = loader.querySelector('.loader-bar');
  bar.style.animation = 'none';
  bar.offsetHeight; // force reflow
  bar.style.animation = '';

  // Open player
  document.getElementById('player').classList.add('open');

  // Set iframe
  frame.src = url;

  // When game loads → hide loader
  frame.onload = () => {
    setTimeout(() => {
      loader.classList.add('hidden');
    }, 400);
  };

  // Fallback (in case iframe never fires onload)
  setTimeout(() => {
    loader.classList.add('hidden');
  }, 5000);
}
function closeGame() {
  document.getElementById('player').classList.remove('open');
  document.getElementById('gameFrame').src = '';

  // Hide loader just in case
  document.getElementById('loader').classList.add('hidden');
}
function applyPreset(btn, url, isVideo) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  setBg(url, isVideo);
  setTimeout(closeBgPanel, 200);
}
function openBgPanel() { document.getElementById('bgPanel').classList.add('open'); }
function closeBgPanel() { document.getElementById('bgPanel').classList.remove('open'); }

function setBg(url, isVideo) {
  const img = document.getElementById('bgImg');
  const vid = document.getElementById('bgVid');
  if (isVideo) {
    img.style.display = 'none';
    vid.src = url; vid.style.display = 'block'; vid.play();
  } else {
    vid.style.display = 'none';
    img.src = url; img.style.display = 'block';
  }
}
function handleBgFile(input) {
  const file = input.files[0]; if (!file) return;
  setBg(URL.createObjectURL(file), file.type.startsWith('video/'));
  closeBgPanel();
}
function applyBgUrl() {
  const url = document.getElementById('bgUrlInput').value.trim();
  if (!url) return;
  setBg(url, /\.(mp4|webm|ogg|mov)(\?|$)/i.test(url));
  closeBgPanel();
}
function clearBg() {
  const img = document.getElementById('bgImg'), vid = document.getElementById('bgVid');
  img.style.display = 'none'; img.src = '';
  vid.style.display = 'none'; vid.src = '';
  closeBgPanel();
}
document.getElementById('bgPanel').addEventListener('click', function(e) {
  if (e.target === this) closeBgPanel();
});
</script>
