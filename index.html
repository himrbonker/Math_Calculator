<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Lightning Arcade</title>

<style>

/* BACKGROUND */

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
color:white;
background: radial-gradient(circle at top, #0f0f1f, #050508);
overflow-x:hidden;
}

/* subtle animated glow */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background: radial-gradient(circle, rgba(0,229,255,0.08), transparent 60%);
animation: pulse 6s infinite linear;
z-index:-1;
}

@keyframes pulse{
0%{transform:translate(-25%,-25%)}
50%{transform:translate(-30%,-30%)}
100%{transform:translate(-25%,-25%)}
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(15,15,25,0.8);
backdrop-filter:blur(10px);
border-bottom:2px solid rgba(0,229,255,0.5);
}

.logo{
font-size:28px;
font-weight:800;
background: linear-gradient(90deg,#00e5ff,#7a5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 20px rgba(0,229,255,0.7);
}

/* NAV */

.nav button{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,229,255,0.2);
color:white;
font-size:15px;
margin-left:15px;
cursor:pointer;
padding:8px 14px;
border-radius:10px;
transition:0.25s;
}

.nav button:hover{
background:#00e5ff;
color:black;
box-shadow:0 0 12px #00e5ff;
}

/* PAGE */

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:22px;
}

/* CARD */

.card{
background:rgba(20,20,30,0.6);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.05);
backdrop-filter:blur(6px);
position:relative;
}

.card::after{
content:"";
position:absolute;
inset:0;
border-radius:16px;
background:linear-gradient(120deg,transparent,#00e5ff55,transparent);
opacity:0;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
box-shadow:0 0 25px rgba(0,229,255,0.4);
border:1px solid rgba(0,229,255,0.4);
}

.card:hover::after{
opacity:1;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
text-align:center;
padding:12px;
font-weight:bold;
letter-spacing:0.5px;
}

/* PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
z-index:100;
}

.player iframe{
flex:1;
border:none;
}

.playerbar{
background:rgba(10,10,20,0.9);
padding:12px;
border-bottom:1px solid rgba(0,229,255,0.3);
}

.playerbar button{
background:linear-gradient(90deg,#00e5ff,#7a5cff);
border:none;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
color:black;
font-weight:bold;
box-shadow:0 0 10px #00e5ff;
transition:0.2s;
}

.playerbar button:hover{
transform:scale(1.05);
}

</style>
</head>

<!-- PLAYER -->

</div>

<iframe id="gameFrame"></iframe>

<script>

function playGame(url){
document.getElementById("player").style.display="flex"
document.getElementById("gameFrame").src=url
}

function closeGame(){
document.getElementById("player").style.display="none"
document.getElementById("gameFrame").src=""
}

function showSection(section){

document.getElementById("gamesSection").style.display="none"
document.getElementById("appsSection").style.display="none"

if(section==="games"){
document.getElementById("gamesSection").style.display="block"
}

if(section==="apps"){
document.getElementById("appsSection").style.display="block"
}

}

</script>
