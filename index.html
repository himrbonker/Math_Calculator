<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Hub</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0f;
color:white;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#111;
border-bottom:2px solid #00e5ff;
}

.logo{
font-size:26px;
font-weight:bold;
color:#00e5ff;
text-shadow:0 0 10px #00e5ff;
}

.nav button{
background:none;
border:none;
color:white;
font-size:16px;
margin-left:20px;
cursor:pointer;
padding:6px 12px;
border-radius:6px;
transition:0.2s;
}

.nav button:hover{
background:#00e5ff;
color:black;
}

/* PAGE */

.container{
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* GAME CARD */

.card{
background:#121218;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
border:2px solid transparent;
}

.card:hover{
transform:scale(1.05);
border:2px solid #00e5ff;
box-shadow:0 0 15px #00e5ff;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
text-align:center;
padding:10px;
font-weight:bold;
}

/* GAME PLAYER */

.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:100;
}

.player iframe{
flex:1;
border:none;
}

.playerbar{
background:#111;
padding:10px;
}

.playerbar button{
background:#00e5ff;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">🕹 Arcade Hub</div>

<div class="nav">
<button onclick="showSection('games')">Games</button>
<button onclick="showSection('apps')">Apps</button>
</div>
</div>

<div class="container">

<!-- GAMES -->

<div id="gamesSection">
<div class="grid">

<div class="card" onclick="playGame('games/karlson/index.html')">
<img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1228610/capsule_616x353.jpg?t=1649362618">
<p>Karlson</p>
</div>

<div class="card" onclick="playGame('A Difficult Game About Climbing.html')">
<img src="https://www4.minijuegosgratis.com/v3/games/thumbnails/249029_7_sq.jpg">
<p>A Difficult Game About Climbing</p>
</div>

<div class="card" onclick="playGame('Hollow Knight.html')">
<img src="https://upload.wikimedia.org/wikipedia/en/d/de/Hollow_Knight_2026_cover_art.jpg">
<p>Hollow Knight</p>
</div>

<div class="card" onclick="playGame('Minecraft 1.12.2.html')">
<img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/original/4X/d/9/a/d9a1f186e29d35026b1a5822fe63950cf59c426d.jpeg">
<p>Minecraft Classic</p>
</div>

<div class="card" onclick="playGame('Gorilla Tag.html')">
<img src="https://image.api.playstation.com/vulcan/ap/rnd/202410/2514/4744c1ac34e78d50f9ecfbc9958ca6375a2011b1bcf9b9b6.png">
<p>Gorilla Tag</p>
</div>

<div class="card" onclick="playGame('https://himrbonker.github.io/roblox-reel-/')">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Roblox_%282025%29_%28App_Icon%29.svg/250px-Roblox_%282025%29_%28App_Icon%29.svg.png">
<p>Roblox</p>
</div>

</div>
</div>

<!-- APPS -->

<div id="appsSection" style="display:none">
<div class="grid">

<div class="card" onclick="playGame('https://himrbonker.github.io/tiktok/')">
<img src="https://sf-static.tiktokcdn.com/obj/eden-sg/uhtyvueh7nulogpoguhm/tiktok-icon2.png">
<p>TikTok</p>
</div>

<div class="card" onclick="playGame('discord.html')">
<img src="https://static.vecteezy.com/system/resources/previews/006/892/625/non_2x/discord-logo-icon-editorial-free-vector.jpg">
<p>Discord</p>
</div>

<div class="card" onclick="playGame('https://ghoogle.org')">
<img src="https://play-lh.googleusercontent.com/Eh-N9HKWJgQ4Oa5wmhaE5RbHkB3m3Ud9tsW6saUHis05BL7Xnpubi5iamR5lDKd-Ew">
<p>Google Proxy</p>
</div>

<div class="card" onclick="playGame('GeForce.html')">
<img src="https://play-lh.googleusercontent.com/_-b_HQXrVyyhZSHj_BoE9u_-cxkcHDH_yLX5rDjJsFMIfsCNQs9F3QP4JvEFcWaSIz0">
<p>GeForce Now</p>
</div>

</div>
</div>

</div>

<!-- PLAYER -->

<div class="player" id="player">

<div class="playerbar">
<button onclick="closeGame()">⬅ Back</button>
</div>

<iframe id="gameFrame"></iframe>

</div>

<script>

function playGame(url){
document.getElementById("player").style.display="flex"
document.getElementById("gameFrame").src=url
}

function closeGame(){
document.getElementById("player").style.display="none"
document.getElementById("gameFrame").src=""
}

function showSection(section){

document.getElementById("gamesSection").style.display="none"
document.getElementById("appsSection").style.display="none"

if(section==="games"){
document.getElementById("gamesSection").style.display="block"
}

if(section==="apps"){
document.getElementById("appsSection").style.display="block"
}

}

</script>

</body>
</html>
